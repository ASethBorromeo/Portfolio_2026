    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">My Portfolio</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="skills.html">Skills</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
        </div>
    </div>

    <div class="page">
        <h1 align="center">Contacts</h1>
        <div class="contacts-container">
          <article class="contact-card">
            <img src="Image/530-Photoroom.png" alt="Email Icon" width="40">
            <p><strong>Email</strong><br>adriansethlagasca10@gmail.com</p>
          </article>
          <article class="contact-card">
            <img src="Image/100646d2-54c9-4a5d-83c0-c9b372fe5b2d-Photoroom.png" alt="Phone Icon" width="40">
            <p><strong>Phone</strong><br>+63 994 7638 993</p>
          </article>
          <article class="contact-card">
            <img src="Image/social-media-logo-design.png" alt="Facebook Icon" width="40">
            <p><strong>Facebook</strong><br><a href="https://www.facebook.com/Adeeelagasca">facebook.com/Adeeelagasca</a></p>
          </article>
          <article class="contact-card">
            <img src="Image/v982-d3-04-Photoroom.png" alt="Instagram Icon" width="40">
            <p><strong>Instagram</strong><br><a href="https://www.instagram.com/adirian_htes">instagram.com/adirian_htes</a></p>
          </article>
        </div>

        <div class="contact-form">
            <h2>Send Me a Message</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" id="submitBtn">Send Message</button>
            </form>
        </div>
    </div>

</body>
</html>
